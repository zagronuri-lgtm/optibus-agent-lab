schema_version: 1
name: run_B_vehicle_driver
description: Simulated combined vehicle-and-driver scenario review.
mode: simulated_controlled_run

target:
  tenant: placeholder-tenant
  map_name: Holon Baseline Example
  url: https://example.optibus.local/maps/holon-baseline
  authentication: manual_login_only

safety:
  v1_simulation_only: true
  require_approval_token: true
  expected_simulated_run_token: "APPROVE:ControlledRunMode:Run"

workflow:
  start_state: AcademyMode
  planned_states:
    - AcademyMode
    - MapAuditMode
    - RunReadinessMode
    - ApprovalGate
    - ControlledRunMode
    - PostRunComparison

scenario:
  run_label: Run B - Vehicle and Driver
  run_type: vehicle_driver
  real_run_allowed: false
  simulated_only: true
  intent: Evaluate combined vehicle allocation and driver-duty impacts.
  assumptions:
    - Baseline map has already been audited in read-only mode.
    - Vehicle and driver outputs are comparison inputs, not generated by v1.
    - Human reviewers will validate any source data before operational use.

comparison:
  baseline_config: configs/holon_baseline.yaml
  kpis:
    - Route count
    - Vehicle count
    - Driver duties
    - Deadhead distance
    - Total platform hours

reporting:
  template: reports/run_comparison_template.md
  output_dir: reports/generated
